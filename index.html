<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0a1a">
  <meta name="description" content="Fruit Cascade — a juicy match-3 fruit puzzle game">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fruit Cascade">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Fruit Cascade</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep:   #0a1a0d;
      --bg-mid:    #0e2813;
      --bg-panel:  rgba(255,255,255,0.04);
      --border:    rgba(255,255,255,0.08);
      --gold:      #f0c060;
      --gold-glow: #ffdd88;
      --silver:    #c8d8e8;
      --text:      #e8e0f8;
      --dim:       #7a6e9a;

      --ruby:      #ff2d55;
      --sapphire:  #0a84ff;
      --emerald:   #30d158;
      --amethyst:  #bf5af2;
      --topaz:     #ffd60a;
      --diamond:   #64d2ff;
      --garnet:    #ff6b35;

      --cell: 60px;
      --gap: 4px;
      --board-size: calc(var(--cell) * 8 + var(--gap) * 9);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }

    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Cinzel', serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Starfield */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  85%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 35% 55%, rgba(200,160,255,0.5) 0%, transparent 100%),
        radial-gradient(2px 2px at 75% 20%, rgba(160,200,255,0.4) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient gradient blobs */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 40% 30% at 15% 20%, rgba(58,140,0,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 35% 40% at 85% 70%, rgba(232,93,0,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 50% 25% at 50% 90%, rgba(230,200,0,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 480px;
      padding: 12px 16px 24px;
      gap: 12px;
    }

    /* Header */
    header {
      text-align: center;
      padding: 6px 0 2px;
    }
    header h1 {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold-glow) 0%, var(--gold) 40%, #e8a030 70%, var(--gold-glow) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.05em;
      text-shadow: none;
      filter: drop-shadow(0 0 12px rgba(240,192,96,0.4));
    }
    header p {
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 10px;
      width: 100%;
    }
    .stat-box {
      flex: 1;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 10px;
      text-align: center;
      backdrop-filter: blur(8px);
    }
    .stat-label {
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 2px;
    }
    .stat-value {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 1.1rem;
      color: var(--gold);
      line-height: 1;
    }
    #moves-val { color: var(--silver); }

    /* Progress bar */
    .progress-wrap {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #e85d00, #e6c800, #3a8c00, #e8002d);
      background-size: 200% 100%;
      transition: width 0.4s ease;
      animation: shimmer 2s linear infinite;
    }
    @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

    /* Board */
    #board-wrap {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(8, var(--cell));
      grid-template-rows: repeat(8, var(--cell));
      gap: var(--gap);
      padding: var(--gap);
      background: rgba(0,0,0,0.20);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      position: relative;
    }

    /* Cell */
    .cell {
      width: var(--cell);
      height: var(--cell);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s ease;
      user-select: none;
      -webkit-user-select: none;
    }
    .cell.empty { background: transparent; }

    /* Fruit */
    .gem {
      width: 52px;
      height: 52px;
      position: relative;
      transition: transform 0.15s ease, filter 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      background: none;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }

    .gem::before { display: none; }
    .gem::after  { display: none; }

    /* No per-fruit backgrounds needed — emoji only */
    .gem-0,.gem-1,.gem-2,.gem-3,.gem-4,.gem-5,.gem-6 { background: none; box-shadow: none; }

    /* Selected */
    .cell.selected .gem {
      transform: scale(1.18);
      animation: pulse-sel 0.6s ease-in-out infinite alternate;
    }
    @keyframes pulse-sel {
      from { filter: drop-shadow(0 0 4px rgba(255,220,80,0.6)); }
      to   { filter: drop-shadow(0 0 14px rgba(255,220,80,1)) drop-shadow(0 0 6px rgba(255,255,255,0.8)); }
    }

    /* Match flash */
    .cell.matching .gem {
      animation: flash-match 0.3s ease forwards;
    }
    @keyframes flash-match {
      0%   { transform: scale(1); opacity: 1; }
      50%  { transform: scale(1.3); opacity: 0.8; filter: brightness(2); }
      100% { transform: scale(0); opacity: 0; }
    }

    /* Drop in */
    .cell.drop-in .gem {
      animation: drop-in 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes drop-in {
      from { transform: translateY(-40px) scale(0.6); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* Swap animation — one-way slide, held at destination */
    .cell.swap-right .gem { animation: slide-r 0.18s ease forwards; }
    .cell.swap-left  .gem { animation: slide-l 0.18s ease forwards; }
    .cell.swap-down  .gem { animation: slide-d 0.18s ease forwards; }
    .cell.swap-up    .gem { animation: slide-u 0.18s ease forwards; }
    @keyframes slide-r { from{transform:translateX(0)} to{transform:translateX(calc(var(--cell) + var(--gap)))} }
    @keyframes slide-l { from{transform:translateX(0)} to{transform:translateX(calc(-1*(var(--cell) + var(--gap))))} }
    @keyframes slide-d { from{transform:translateY(0)} to{transform:translateY(calc(var(--cell) + var(--gap)))} }
    @keyframes slide-u { from{transform:translateY(0)} to{transform:translateY(calc(-1*(var(--cell) + var(--gap))))} }

    /* Bounce-back for invalid swaps only */
    .cell.bounce-right .gem { animation: bounce-r 0.30s ease forwards; }
    .cell.bounce-left  .gem { animation: bounce-l 0.30s ease forwards; }
    .cell.bounce-down  .gem { animation: bounce-d 0.30s ease forwards; }
    .cell.bounce-up    .gem { animation: bounce-u 0.30s ease forwards; }
    @keyframes bounce-r { 0%{transform:translateX(0)} 40%{transform:translateX(calc((var(--cell) + var(--gap))*0.5))} 100%{transform:translateX(0)} }
    @keyframes bounce-l { 0%{transform:translateX(0)} 40%{transform:translateX(calc(-1*(var(--cell) + var(--gap))*0.5))} 100%{transform:translateX(0)} }
    @keyframes bounce-d { 0%{transform:translateY(0)} 40%{transform:translateY(calc((var(--cell) + var(--gap))*0.5))} 100%{transform:translateY(0)} }
    @keyframes bounce-u { 0%{transform:translateY(0)} 40%{transform:translateY(calc(-1*(var(--cell) + var(--gap))*0.5))} 100%{transform:translateY(0)} }

    /* Hint pulse */
    .cell.hint .gem { animation: hint-pulse 0.8s ease-in-out 3; }
    @keyframes hint-pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.15); filter: brightness(1.5) saturate(1.5); }
    }

    /* Score popup */
    .score-pop {
      position: absolute;
      pointer-events: none;
      font-family: 'Cinzel Decorative', cursive;
      font-size: 1rem;
      color: var(--gold-glow);
      text-shadow: 0 0 8px rgba(255,220,100,0.8);
      animation: score-float 1s ease forwards;
      z-index: 100;
      white-space: nowrap;
    }
    @keyframes score-float {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
    }

    /* Bottom buttons */
    .actions {
      display: flex;
      gap: 10px;
      width: 100%;
    }
    .btn {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-panel);
      color: var(--text);
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }
    .btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
    .btn:active { transform: scale(0.96); }
    .btn.primary {
      background: linear-gradient(135deg, rgba(191,90,242,0.3), rgba(10,132,255,0.3));
      border-color: rgba(191,90,242,0.4);
      color: var(--gold);
    }
    #hint-btn { position: relative; }
    #hint-count {
      position: absolute;
      top: 4px; right: 6px;
      font-size: 0.6rem;
      color: var(--dim);
    }

    /* Level complete overlay */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(13,10,26,0.92);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    #overlay.show { opacity: 1; pointer-events: all; }
    .overlay-card {
      background: linear-gradient(160deg, rgba(30,20,60,0.95), rgba(20,12,40,0.95));
      border: 1px solid rgba(240,192,96,0.3);
      border-radius: 20px;
      padding: 36px 40px;
      text-align: center;
      max-width: 300px;
      width: 90%;
      box-shadow: 0 0 60px rgba(191,90,242,0.2), 0 0 120px rgba(10,132,255,0.1);
    }
    .overlay-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 1.6rem;
      color: var(--gold);
      filter: drop-shadow(0 0 8px rgba(240,192,96,0.5));
      margin-bottom: 8px;
    }
    .overlay-sub {
      font-size: 0.75rem;
      color: var(--dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .overlay-score {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 2.2rem;
      color: var(--gold-glow);
      margin-bottom: 24px;
    }
    .stars {
      font-size: 2rem;
      margin-bottom: 20px;
      letter-spacing: 0.2em;
    }
    .overlay-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, rgba(191,90,242,0.4), rgba(10,132,255,0.4));
      border: 1px solid rgba(191,90,242,0.5);
      border-radius: 12px;
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .overlay-btn:hover { background: linear-gradient(135deg, rgba(191,90,242,0.6), rgba(10,132,255,0.6)); }
    .overlay-btn:active { transform: scale(0.97); }

    /* Mobile scale */
    @media (max-width: 420px) {
      :root { --cell: 42px; --gap: 3px; }
      .gem { width: 36px; height: 36px; font-size: 26px; }
      .gem::after { display: none; }
    }
    @media (max-width: 360px) {
      :root { --cell: 38px; --gap: 2px; }
      .gem { width: 33px; height: 33px; font-size: 23px; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>Fruit Cascade</h1>
    <p>Match · Splash · Munch</p>
  </header>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score-val">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Level</div>
      <div class="stat-value" id="level-val">1</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Target</div>
      <div class="stat-value" id="target-val">500</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Moves</div>
      <div class="stat-value" id="moves-val">30</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progress-bar" style="width:0%"></div>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <div class="actions">
    <button class="btn" id="hint-btn">💡 Hint<span id="hint-count">3</span></button>
    <button class="btn primary" id="new-btn">✦ New Game</button>
    <button class="btn" id="shuffle-btn">🔀 Shuffle</button>
  </div>
</div>

<div id="overlay">
  <div class="overlay-card">
    <div class="overlay-title" id="ol-title">Level Complete!</div>
    <div class="stars" id="ol-stars">★★★</div>
    <div class="overlay-sub" id="ol-sub">Score</div>
    <div class="overlay-score" id="ol-score">0</div>
    <button class="overlay-btn" id="ol-btn">Next Level</button>
  </div>
</div>

<script>
const COLS = 8, ROWS = 8;
const GEM_TYPES = 7;
const GEM_EMOJI = ['🍓','🍇','🍏','🍋','🍊','🍒','🍉'];

let board = [], score = 0, level = 1, moves = 30, target = 500;
let selected = null, hints = 3, busy = false;
let touchStart = null;

const boardEl  = document.getElementById('board');
const scoreEl  = document.getElementById('score-val');
const levelEl  = document.getElementById('level-val');
const targetEl = document.getElementById('target-val');
const movesEl  = document.getElementById('moves-val');
const progEl   = document.getElementById('progress-bar');
const hintCnt  = document.getElementById('hint-count');
const overlay  = document.getElementById('overlay');

// ── Board helpers ──────────────────────────────────────────────────────────

function rand(n) { return Math.floor(Math.random() * n); }

function initBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    for (let c = 0; c < COLS; c++) {
      board[r][c] = safeGem(r, c);
    }
  }
}

function safeGem(r, c) {
  const excluded = new Set();
  if (c >= 2 && board[r][c-1] === board[r][c-2]) excluded.add(board[r][c-1]);
  if (r >= 2 && board[r-1] && board[r-1][c] === (board[r-2] && board[r-2][c])) {
    if (board[r-1] && board[r-2]) excluded.add(board[r-1][c]);
  }
  let g;
  do { g = rand(GEM_TYPES); } while (excluded.has(g));
  return g;
}

function hasMoves() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (c < COLS-1) {
        swap(r, c, r, c+1);
        if (findMatches().length) { swap(r, c, r, c+1); return true; }
        swap(r, c, r, c+1);
      }
      if (r < ROWS-1) {
        swap(r, c, r+1, c);
        if (findMatches().length) { swap(r, c, r+1, c); return true; }
        swap(r, c, r+1, c);
      }
    }
  }
  return false;
}

function swap(r1,c1,r2,c2) {
  [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
}

function findMatches() {
  const matched = new Set();
  // Horizontal
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS-2; c++) {
      const g = board[r][c];
      if (g !== null && g === board[r][c+1] && g === board[r][c+2]) {
        let len = 3;
        while (c+len < COLS && board[r][c+len] === g) len++;
        for (let i = 0; i < len; i++) matched.add(r*COLS + c+i);
        c += len - 1;
      }
    }
  }
  // Vertical
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS-2; r++) {
      const g = board[r][c];
      if (g !== null && g === board[r+1][c] && g === board[r+2][c]) {
        let len = 3;
        while (r+len < ROWS && board[r+len][c] === g) len++;
        for (let i = 0; i < len; i++) matched.add((r+i)*COLS + c);
        r += len - 1;
      }
    }
  }
  return [...matched].map(idx => ({ r: Math.floor(idx/COLS), c: idx%COLS }));
}

// ── Rendering ──────────────────────────────────────────────────────────────

function render(dropCells = new Set(), newCells = new Set()) {
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r; cell.dataset.c = c;

      const g = board[r][c];
      if (g !== null) {
        const gem = document.createElement('div');
        gem.className = `gem gem-${g}`;
        gem.textContent = GEM_EMOJI[g];
        if (newCells.has(r*COLS+c)) cell.classList.add('drop-in');
        cell.appendChild(gem);
      } else {
        cell.classList.add('empty');
      }

      cell.addEventListener('pointerdown', onPointerDown);
      boardEl.appendChild(cell);
    }
  }
  updateUI();
}

function getCell(r, c) {
  return boardEl.children[r * COLS + c];
}

function updateUI() {
  scoreEl.textContent = score.toLocaleString();
  movesEl.textContent = moves;
  levelEl.textContent = level;
  targetEl.textContent = target.toLocaleString();
  hintCnt.textContent = hints;
  const pct = Math.min(100, (score / target) * 100);
  progEl.style.width = pct + '%';
}

// ── Input ──────────────────────────────────────────────────────────────────

function onPointerDown(e) {
  if (busy) return;
  e.preventDefault();
  const r = +e.currentTarget.dataset.r;
  const c = +e.currentTarget.dataset.c;
  touchStart = { r, c, x: e.clientX, y: e.clientY };
  e.currentTarget.setPointerCapture(e.pointerId);
  e.currentTarget.addEventListener('pointerup', onPointerUp, { once: true });
  e.currentTarget.addEventListener('pointermove', onPointerMove);
}

function onPointerMove(e) {
  if (!touchStart) return;
  const dx = e.clientX - touchStart.x;
  const dy = e.clientY - touchStart.y;
  const threshold = 20;
  if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
    e.currentTarget.removeEventListener('pointermove', onPointerMove);
    const { r, c } = touchStart;
    touchStart = null;
    if (Math.abs(dx) > Math.abs(dy)) {
      trySwap(r, c, r, c + (dx > 0 ? 1 : -1));
    } else {
      trySwap(r, c, r + (dy > 0 ? 1 : -1), c);
    }
  }
}

function onPointerUp(e) {
  e.currentTarget.removeEventListener('pointermove', onPointerMove);
  if (!touchStart) return;
  const { r, c } = touchStart;
  touchStart = null;
  handleTap(r, c);
}

function handleTap(r, c) {
  if (board[r][c] === null) return;
  if (!selected) {
    selected = { r, c };
    getCell(r, c).classList.add('selected');
    return;
  }
  const { r: sr, c: sc } = selected;
  getCell(sr, sc).classList.remove('selected');
  selected = null;
  if (sr === r && sc === c) return;
  const dr = Math.abs(r - sr), dc = Math.abs(c - sc);
  if (dr + dc === 1) trySwap(sr, sc, r, c);
}

async function trySwap(r1, c1, r2, c2) {
  if (r2 < 0 || r2 >= ROWS || c2 < 0 || c2 >= COLS) return;
  if (busy) return;
  busy = true;

  const dir1 = r1===r2 ? (c2>c1?'right':'left') : (r2>r1?'down':'up');
  const dir2 = r1===r2 ? (c2>c1?'left':'right') : (r2>r1?'up':'down');

  // Check validity BEFORE animating
  swap(r1,c1,r2,c2);
  const matches = findMatches();

  if (!matches.length) {
    // Invalid — undo data immediately, show subtle bounce
    swap(r1,c1,r2,c2);
    getCell(r1,c1).classList.add('bounce-'+dir1);
    getCell(r2,c2).classList.add('bounce-'+dir2);
    await delay(320);
    getCell(r1,c1).classList.remove('bounce-'+dir1);
    getCell(r2,c2).classList.remove('bounce-'+dir2);
    busy = false;
    return;
  }

  // Valid — animate the one-way slide, then immediately re-render with swapped data
  getCell(r1,c1).classList.add('swap-'+dir1);
  getCell(r2,c2).classList.add('swap-'+dir2);
  await delay(190);

  moves--;
  render(); // redraws board with swapped positions — no snap-back
  await processCascade(matches, 1);
  render();

  if (!hasMoves()) shuffleBoard();

  if (score >= target) {
    showLevelComplete();
  } else if (moves <= 0) {
    showGameOver();
  }

  busy = false;
}

async function processCascade(matches, combo) {
  if (!matches.length) return;

  // Flash matches
  matches.forEach(({r,c}) => {
    getCell(r,c)?.classList.add('matching');
  });
  await delay(300);

  // Score
  const pts = matches.length * 50 * combo;
  score += pts;
  showScorePop(matches, pts);

  // Remove
  matches.forEach(({r,c}) => { board[r][c] = null; });
  render();
  await delay(150);

  // Gravity
  await dropGems();

  // Fill
  const newCells = fillTop();
  render(new Set(), newCells);
  await delay(350);

  // Check cascades
  const next = findMatches();
  if (next.length) await processCascade(next, combo + 1);
}

async function dropGems() {
  for (let c = 0; c < COLS; c++) {
    let empty = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][c] !== null) {
        board[empty][c] = board[r][c];
        if (empty !== r) board[r][c] = null;
        empty--;
      }
    }
  }
}

function fillTop() {
  const newCells = new Set();
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      if (board[r][c] === null) {
        board[r][c] = rand(GEM_TYPES);
        newCells.add(r * COLS + c);
      }
    }
  }
  return newCells;
}

function showScorePop(matches, pts) {
  const first = matches[0];
  const cell = getCell(first.r, first.c);
  if (!cell) return;
  const rect = cell.getBoundingClientRect();
  const wrap = document.getElementById('board-wrap');
  const wRect = wrap.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = '+' + pts;
  pop.style.left = (rect.left - wRect.left) + 'px';
  pop.style.top  = (rect.top  - wRect.top)  + 'px';
  wrap.appendChild(pop);
  pop.addEventListener('animationend', () => pop.remove());
}

// ── Shuffle ────────────────────────────────────────────────────────────────

function shuffleBoard() {
  const flat = board.flat().filter(g => g !== null);
  for (let i = flat.length - 1; i > 0; i--) {
    const j = rand(i + 1);
    [flat[i], flat[j]] = [flat[j], flat[i]];
  }
  let idx = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      board[r][c] = flat[idx++];

  if (!hasMoves()) shuffleBoard();
}

// ── Hints ──────────────────────────────────────────────────────────────────

function showHint() {
  if (hints <= 0 || busy) return;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (c < COLS-1) {
        swap(r,c,r,c+1);
        if (findMatches().length) {
          swap(r,c,r,c+1);
          hints--;
          hintCnt.textContent = hints;
          const c1 = getCell(r,c), c2 = getCell(r,c+1);
          c1.classList.add('hint'); c2.classList.add('hint');
          setTimeout(() => { c1.classList.remove('hint'); c2.classList.remove('hint'); }, 2500);
          return;
        }
        swap(r,c,r,c+1);
      }
      if (r < ROWS-1) {
        swap(r,c,r+1,c);
        if (findMatches().length) {
          swap(r,c,r+1,c);
          hints--;
          hintCnt.textContent = hints;
          const c1 = getCell(r,c), c2 = getCell(r+1,c);
          c1.classList.add('hint'); c2.classList.add('hint');
          setTimeout(() => { c1.classList.remove('hint'); c2.classList.remove('hint'); }, 2500);
          return;
        }
        swap(r,c,r+1,c);
      }
    }
  }
}

// ── Level complete / Game over ─────────────────────────────────────────────

function showLevelComplete() {
  const stars = score >= target * 1.5 ? '★★★' : score >= target * 1.2 ? '★★☆' : '★☆☆';
  document.getElementById('ol-title').textContent = 'Level Complete!';
  document.getElementById('ol-stars').textContent = stars;
  document.getElementById('ol-sub').textContent = 'Score';
  document.getElementById('ol-score').textContent = score.toLocaleString();
  document.getElementById('ol-btn').textContent = 'Next Level ›';
  document.getElementById('ol-btn').onclick = nextLevel;
  overlay.classList.add('show');
}

function showGameOver() {
  document.getElementById('ol-title').textContent = 'No More Moves';
  document.getElementById('ol-stars').textContent = '💔';
  document.getElementById('ol-sub').textContent = 'Final Score';
  document.getElementById('ol-score').textContent = score.toLocaleString();
  document.getElementById('ol-btn').textContent = 'Try Again';
  document.getElementById('ol-btn').onclick = newGame;
  overlay.classList.add('show');
}

function nextLevel() {
  overlay.classList.remove('show');
  level++;
  target = Math.round(target * 1.6);
  moves = 30 + Math.min(level * 2, 20);
  hints = 3;
  initBoard();
  render();
}

function newGame() {
  overlay.classList.remove('show');
  score = 0; level = 1; target = 500; moves = 30; hints = 3; selected = null;
  initBoard();
  render();
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Init ───────────────────────────────────────────────────────────────────

document.getElementById('new-btn').addEventListener('click', newGame);
document.getElementById('hint-btn').addEventListener('click', showHint);
document.getElementById('shuffle-btn').addEventListener('click', () => {
  if (busy) return;
  shuffleBoard();
  render();
});

initBoard();
render();

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
