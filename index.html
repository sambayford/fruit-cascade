<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0a1a">
  <meta name="description" content="Fruit Cascade — a juicy match-3 fruit puzzle game">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fruit Cascade">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Fruit Cascade</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep:   #0a1a0d;
      --bg-mid:    #0e2813;
      --bg-panel:  rgba(255,255,255,0.04);
      --border:    rgba(255,255,255,0.08);
      --gold:      #f0c060;
      --gold-glow: #ffdd88;
      --silver:    #c8d8e8;
      --text:      #e8e0f8;
      --dim:       #7a6e9a;

      --ruby:      #ff2d55;
      --sapphire:  #0a84ff;
      --emerald:   #30d158;
      --amethyst:  #bf5af2;
      --topaz:     #ffd60a;
      --diamond:   #64d2ff;
      --garnet:    #ff6b35;

      --cell: 60px;
      --gap: 4px;
      --board-size: calc(var(--cell) * 8 + var(--gap) * 9);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }

    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Cinzel', serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Starfield */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  85%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 35% 55%, rgba(200,160,255,0.5) 0%, transparent 100%),
        radial-gradient(2px 2px at 75% 20%, rgba(160,200,255,0.4) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient gradient blobs */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 40% 30% at 15% 20%, rgba(58,140,0,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 35% 40% at 85% 70%, rgba(232,93,0,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 50% 25% at 50% 90%, rgba(230,200,0,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 480px;
      padding: 12px 16px 24px;
      gap: 12px;
    }

    /* Header */
    header {
      text-align: center;
      padding: 6px 0 2px;
    }
    header h1 {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold-glow) 0%, var(--gold) 40%, #e8a030 70%, var(--gold-glow) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.05em;
      text-shadow: none;
      filter: drop-shadow(0 0 12px rgba(240,192,96,0.4));
    }
    header p {
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 10px;
      width: 100%;
    }
    .stat-box {
      flex: 1;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 10px;
      text-align: center;
      backdrop-filter: blur(8px);
    }
    .stat-label {
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 2px;
    }
    .stat-value {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 1.1rem;
      color: var(--gold);
      line-height: 1;
    }
    #moves-val { color: var(--silver); transition: color 0.3s; }
    #moves-val.warn  { color: var(--topaz); }
    #moves-val.danger { color: var(--ruby); animation: flash-danger 0.6s ease-in-out infinite alternate; }
    @keyframes flash-danger {
      from { color: var(--ruby); text-shadow: none; }
      to   { color: #ff6680; text-shadow: 0 0 12px rgba(255,45,85,0.9); }
    }

    /* Progress bar */
    .progress-wrap {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #e85d00, #e6c800, #3a8c00, #e8002d);
      background-size: 200% 100%;
      transition: width 0.4s ease;
      animation: shimmer 2s linear infinite;
    }
    @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

    /* Board */
    #board-wrap {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(8, var(--cell));
      grid-template-rows: repeat(8, var(--cell));
      gap: var(--gap);
      padding: var(--gap);
      background: rgba(0,0,0,0.20);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      position: relative;
    }

    /* Cell */
    .cell {
      width: var(--cell);
      height: var(--cell);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s ease;
      user-select: none;
      -webkit-user-select: none;
    }
    .cell.empty { background: transparent; }

    /* Fruit */
    .gem {
      width: 52px;
      height: 52px;
      position: relative;
      transition: transform 0.15s ease, filter 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      background: none;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }

    .gem::before { display: none; }
    .gem::after  { display: none; }

    /* No per-fruit backgrounds needed — emoji only */
    .gem-0,.gem-1,.gem-2,.gem-3,.gem-4,.gem-5,.gem-6 { background: none; box-shadow: none; }

    /* Selected */
    .cell.selected .gem {
      transform: scale(1.18);
      animation: pulse-sel 0.6s ease-in-out infinite alternate;
    }
    @keyframes pulse-sel {
      from { filter: drop-shadow(0 0 4px rgba(255,220,80,0.6)); }
      to   { filter: drop-shadow(0 0 14px rgba(255,220,80,1)) drop-shadow(0 0 6px rgba(255,255,255,0.8)); }
    }

    /* Match flash */
    /* matched cells hide immediately — flying clones do the visual */
    .cell.matching .gem { visibility: hidden; }

    /* Flying fruit clone */
    .fly-fruit {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      font-size: 30px;
      line-height: 1;
      will-change: transform, opacity;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
    }

    /* Drop in */
    .cell.drop-in .gem {
      animation: drop-in 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes drop-in {
      from { transform: translateY(-40px) scale(0.6); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* Swap animation — one-way slide, held at destination */
    .cell.swap-right .gem { animation: slide-r 0.18s ease forwards; }
    .cell.swap-left  .gem { animation: slide-l 0.18s ease forwards; }
    .cell.swap-down  .gem { animation: slide-d 0.18s ease forwards; }
    .cell.swap-up    .gem { animation: slide-u 0.18s ease forwards; }
    @keyframes slide-r { from{transform:translateX(0)} to{transform:translateX(calc(var(--cell) + var(--gap)))} }
    @keyframes slide-l { from{transform:translateX(0)} to{transform:translateX(calc(-1*(var(--cell) + var(--gap))))} }
    @keyframes slide-d { from{transform:translateY(0)} to{transform:translateY(calc(var(--cell) + var(--gap)))} }
    @keyframes slide-u { from{transform:translateY(0)} to{transform:translateY(calc(-1*(var(--cell) + var(--gap))))} }

    /* Bounce-back for invalid swaps only */
    .cell.bounce-right .gem { animation: bounce-r 0.30s ease forwards; }
    .cell.bounce-left  .gem { animation: bounce-l 0.30s ease forwards; }
    .cell.bounce-down  .gem { animation: bounce-d 0.30s ease forwards; }
    .cell.bounce-up    .gem { animation: bounce-u 0.30s ease forwards; }
    @keyframes bounce-r { 0%{transform:translateX(0)} 40%{transform:translateX(calc((var(--cell) + var(--gap))*0.5))} 100%{transform:translateX(0)} }
    @keyframes bounce-l { 0%{transform:translateX(0)} 40%{transform:translateX(calc(-1*(var(--cell) + var(--gap))*0.5))} 100%{transform:translateX(0)} }
    @keyframes bounce-d { 0%{transform:translateY(0)} 40%{transform:translateY(calc((var(--cell) + var(--gap))*0.5))} 100%{transform:translateY(0)} }
    @keyframes bounce-u { 0%{transform:translateY(0)} 40%{transform:translateY(calc(-1*(var(--cell) + var(--gap))*0.5))} 100%{transform:translateY(0)} }

    /* Hint pulse */
    .cell.hint .gem { animation: hint-pulse 0.8s ease-in-out 3; }
    @keyframes hint-pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.15); filter: brightness(1.5) saturate(1.5); }
    }

    /* Score popup */
    .score-pop {
      position: absolute;
      pointer-events: none;
      font-family: 'Cinzel Decorative', cursive;
      font-size: 1rem;
      color: var(--gold-glow);
      text-shadow: 0 0 8px rgba(255,220,100,0.8);
      animation: score-float 1s ease forwards;
      z-index: 100;
      white-space: nowrap;
    }
    @keyframes score-float {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
    }

    /* Bottom buttons */
    .actions {
      display: flex;
      gap: 10px;
      width: 100%;
    }
    .btn {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-panel);
      color: var(--text);
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }
    .btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
    .btn:active { transform: scale(0.96); }
    .btn.primary {
      background: linear-gradient(135deg, rgba(191,90,242,0.3), rgba(10,132,255,0.3));
      border-color: rgba(191,90,242,0.4);
      color: var(--gold);
    }
    #hint-btn { position: relative; }
    #hint-count {
      position: absolute;
      top: 4px; right: 6px;
      font-size: 0.6rem;
      color: var(--dim);
    }

    /* Level complete overlay */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(13,10,26,0.92);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    #overlay.show { opacity: 1; pointer-events: all; }
    .overlay-card {
      background: linear-gradient(160deg, rgba(30,20,60,0.95), rgba(20,12,40,0.95));
      border: 1px solid rgba(240,192,96,0.3);
      border-radius: 20px;
      padding: 36px 40px;
      text-align: center;
      max-width: 300px;
      width: 90%;
      box-shadow: 0 0 60px rgba(191,90,242,0.2), 0 0 120px rgba(10,132,255,0.1);
    }
    .overlay-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 1.6rem;
      color: var(--gold);
      filter: drop-shadow(0 0 8px rgba(240,192,96,0.5));
      margin-bottom: 8px;
    }
    .overlay-sub {
      font-size: 0.75rem;
      color: var(--dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .overlay-score {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 2.2rem;
      color: var(--gold-glow);
      margin-bottom: 24px;
    }
    .overlay-moves {
      font-size: 0.75rem;
      color: var(--dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .overlay-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, rgba(191,90,242,0.4), rgba(10,132,255,0.4));
      border: 1px solid rgba(191,90,242,0.5);
      border-radius: 12px;
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .overlay-btn:hover { background: linear-gradient(135deg, rgba(191,90,242,0.6), rgba(10,132,255,0.6)); }
    .overlay-btn:active { transform: scale(0.97); }

    /* Mobile scale */
    @media (max-width: 420px) {
      :root { --cell: 42px; --gap: 3px; }
      .gem { width: 36px; height: 36px; font-size: 26px; }
      .gem::after { display: none; }
    }
    @media (max-width: 360px) {
      :root { --cell: 38px; --gap: 2px; }
      .gem { width: 33px; height: 33px; font-size: 23px; }
    }

    /* Monkey */
    #monkey-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 52px;
      position: relative;
      width: 100%;
    }
    #monkey {
      font-size: 2.4rem;
      line-height: 1;
      transition: transform 0.15s ease;
      display: inline-block;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }
    #monkey.chomp {
      animation: monkey-chomp 0.5s ease forwards;
    }
    @keyframes monkey-chomp {
      0%   { transform: scale(1) rotate(0deg); }
      20%  { transform: scale(1.35) rotate(-12deg); }
      45%  { transform: scale(1.25) rotate(10deg); }
      70%  { transform: scale(1.15) rotate(-6deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    #monkey.idle {
      animation: monkey-idle 2.5s ease-in-out infinite;
    }
    @keyframes monkey-idle {
      0%,100% { transform: translateY(0) rotate(0deg); }
      30%     { transform: translateY(-3px) rotate(-4deg); }
      70%     { transform: translateY(-1px) rotate(3deg); }
    }
    #monkey-fruit {
      font-size: 1.6rem;
      line-height: 1;
      min-width: 28px;
      text-align: left;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #monkey-fruit.show {
      animation: fruit-appear 0.9s ease forwards;
    }
    @keyframes fruit-appear {
      0%   { opacity: 0; transform: translateX(-10px) scale(0.5); }
      25%  { opacity: 1; transform: translateX(0) scale(1.2); }
      60%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.3) translateX(20px); }
    }
    #monkey-speech {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      color: var(--gold);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      min-width: 60px;
    }
    #monkey-speech.show {
      animation: speech-pop 1.4s ease forwards;
    }
    @keyframes speech-pop {
      0%   { opacity: 0; transform: translateY(4px); }
      20%  { opacity: 1; transform: translateY(0); }
      75%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-8px); }
    }


    /* Special (glowing) fruit */
    .gem.glowing {
      animation: glow-pulse 0.9s ease-in-out infinite alternate;
      border-radius: 50%;
    }
    @keyframes glow-pulse {
      from {
        filter: drop-shadow(0 0 4px #fff) drop-shadow(0 0 8px currentColor);
        transform: scale(1);
      }
      to {
        filter: drop-shadow(0 0 10px #fff) drop-shadow(0 0 20px #ffe066) drop-shadow(0 0 30px #ff8c00);
        transform: scale(1.12);
      }
    }
    /* Special fruit — also hide gem, flying clone carries the visual */
    .cell.matching-special .gem { visibility: hidden; }


    /* Combo counter */
    #combo-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 50;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #combo-display.show {
      opacity: 1;
    }
    #combo-display .combo-x {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(2.5rem, 12vw, 4rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #fff176, #ffd600, #ff6f00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 16px rgba(255,200,0,0.8));
      animation: combo-pop 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    #combo-display .combo-label {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.85;
      margin-top: 2px;
    }
    @keyframes combo-pop {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }


    /* Fruit row — 2 rows of 3 */
    .fruit-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      width: 100%;
    }
    .stat-fruit {
      flex: 1;
      font-family: 'Cinzel', serif;
      color: var(--dim);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      min-height: 22px;
    }
    .stat-fruit .sf-emoji { font-size: 1.8rem; line-height: 1; }
    .stat-fruit .sf-count { font-size: 0.9rem; color: var(--dim); }
    .stat-fruit.done .sf-count { color: #30d158; }
    .stat-fruit .sf-check { opacity: 0; font-size: 0.9rem; transition: opacity 0.3s; }
    .stat-fruit.done .sf-check { opacity: 1; color: #30d158; }

  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>Fruit Cascade</h1>
    <p>Match · Splash · Munch</p>
  </header>



  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <div id="monkey-wrap">
    <div id="monkey-fruit"></div>
    <div id="monkey">🐒</div>
    <div id="monkey-speech"></div>
  </div>

  <div class="fruit-row">
    <div class="stat-fruit" id="fruit-slot-0"></div>
    <div class="stat-fruit" id="fruit-slot-1"></div>
    <div class="stat-fruit" id="fruit-slot-2"></div>
    <div class="stat-fruit" id="fruit-slot-3"></div>
    <div class="stat-fruit" id="fruit-slot-4"></div>
    <div class="stat-fruit" id="fruit-slot-5"></div>
  </div>
  <div class="actions">
    <div class="stat-box" style="flex:1">
      <div class="stat-label">Moves Left</div>
      <div class="stat-value" id="moves-used-val">30</div>
    </div>
  </div>
</div>

<div id="overlay">
  <div class="overlay-card">
    <div class="overlay-title" id="ol-title">Level Complete!</div>
    <div class="overlay-moves" id="ol-moves"></div>
    <div id="ol-hiscore-wrap" style="font-size:0.7rem;color:var(--gold);letter-spacing:0.12em;margin:4px 0 16px;display:none">🏆 New Best Level!</div>
    <button class="overlay-btn" id="ol-btn">Next Level</button>
  </div>
</div>

<script>
const COLS = 8, ROWS = 8;
const GEM_TYPES = 6;
const GEM_EMOJI = ['🍉','🍇','🍏','🍌','🍊','🫐'];

const SAVE_KEY = 'fruitCascade_save';
const BEST_KEY = 'fruitCascade_best';

let board = [];
let special = []; // parallel board: null | 'glowing'
let level = 1, moves = 30, movesUsed = 0, bestLevel = 1, hints = 3;
let fruitTargets = [], fruitCollected = [];
let selected = null, busy = false, touchStart = null;

const boardEl     = document.getElementById('board');
const movesUsedEl = document.getElementById('moves-used-val');
const overlay     = document.getElementById('overlay');

// ── Utilities ──────────────────────────────────────────────────────────────

function rnd(n) { return Math.floor(Math.random() * n); }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Board ──────────────────────────────────────────────────────────────────

function levelFruitTargets(lvl) {
  const count = lvl * 3;
  return Array.from({ length: GEM_TYPES }, () => count);
}
function initTargets() {
  fruitTargets   = levelFruitTargets(level);
  fruitCollected = Array(GEM_TYPES).fill(0);
}
function allTargetsMet() {
  return fruitTargets.every((t, i) => (fruitCollected[i] || 0) >= t);
}

function newBoard() {
  board = []; special = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = []; special[r] = [];
    for (let c = 0; c < COLS; c++) {
      board[r][c] = safePick(r, c);
      special[r][c] = null;
    }
  }
}

function safePick(r, c) {
  const bad = new Set();
  if (c >= 2 && board[r][c-1] === board[r][c-2]) bad.add(board[r][c-1]);
  if (r >= 2 && board[r-1] && board[r-2] && board[r-1][c] === board[r-2][c]) bad.add(board[r-1][c]);
  let g;
  do { g = rnd(GEM_TYPES); } while (bad.has(g));
  return g;
}

function swapCells(r1, c1, r2, c2) {
  const tmp = board[r1][c1];
  board[r1][c1] = board[r2][c2];
  board[r2][c2] = tmp;
  const ts = special[r1][c1];
  special[r1][c1] = special[r2][c2];
  special[r2][c2] = ts;
}

// Returns {cells, type, dir, pivot} per match-group, plus flat cell list
function getMatchGroups() {
  const groups = [];
  const counted = new Set();
  // Horizontal groups
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      const g = board[r][c];
      if (g === null) continue;
      if (g === board[r][c+1] && g === board[r][c+2]) {
        let len = 3;
        while (c + len < COLS && board[r][c+len] === g) len++;
        const cells = [];
        for (let i = 0; i < len; i++) cells.push([r, c+i]);
        groups.push({ cells, len, dir: 'h', pivot: [r, c + Math.floor(len/2)], gemType: g });
        c += len - 1;
      }
    }
  }
  // Vertical groups
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      const g = board[r][c];
      if (g === null) continue;
      if (g === board[r+1][c] && g === board[r+2][c]) {
        let len = 3;
        while (r + len < ROWS && board[r+len][c] === g) len++;
        const cells = [];
        for (let i = 0; i < len; i++) cells.push([r+i, c]);
        groups.push({ cells, len, dir: 'v', pivot: [r + Math.floor(len/2), c], gemType: g });
        r += len - 1;
      }
    }
  }
  // Flat unique cell list
  const hitSet = new Set();
  for (const g of groups) for (const [r,c] of g.cells) hitSet.add(r*COLS+c);
  const allCells = [...hitSet].map(idx => [Math.floor(idx/COLS), idx%COLS]);
  return { groups, allCells };
}

function getMatches() {
  return getMatchGroups().allCells;
}

function hasValidMove() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (c < COLS - 1) {
        swapCells(r, c, r, c+1);
        const ok = getMatches().length > 0;
        swapCells(r, c, r, c+1);
        if (ok) return true;
      }
      if (r < ROWS - 1) {
        swapCells(r, c, r+1, c);
        const ok = getMatches().length > 0;
        swapCells(r, c, r+1, c);
        if (ok) return true;
      }
    }
  }
  return false;
}

function shuffleBoard() {
  const flat = board.flat().filter(g => g !== null);
  for (let i = flat.length - 1; i > 0; i--) {
    const j = rnd(i + 1);
    [flat[i], flat[j]] = [flat[j], flat[i]];
  }
  let idx = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      board[r][c] = flat[idx++];
  if (!hasValidMove()) shuffleBoard();
}

function safeRandom(r, c) {
  // Try each possible gem type and reject any that would form a 3-in-a-row
  // by temporarily placing it and checking matches in its neighbourhood only.
  const candidates = [];
  for (let g = 0; g < GEM_TYPES; g++) {
    board[r][c] = g;
    // Check horizontal runs touching this cell
    let hOk = true;
    const hStart = Math.max(0, c - 2);
    const hEnd   = Math.min(COLS - 3, c);
    for (let cc = hStart; cc <= hEnd; cc++) {
      if (board[r][cc] !== null && board[r][cc] === board[r][cc+1] && board[r][cc] === board[r][cc+2]) { hOk = false; break; }
    }
    // Check vertical runs touching this cell
    let vOk = true;
    const vStart = Math.max(0, r - 2);
    const vEnd   = Math.min(ROWS - 3, r);
    for (let rr = vStart; rr <= vEnd; rr++) {
      if (board[rr][c] !== null && board[rr][c] === board[rr+1][c] && board[rr][c] === board[rr+2][c]) { vOk = false; break; }
    }
    if (hOk && vOk) candidates.push(g);
    board[r][c] = null;
  }
  // Pick randomly from safe candidates; fall back to full random if none (shouldn't happen)
  return candidates.length ? candidates[rnd(candidates.length)] : rnd(GEM_TYPES);
}

function dropAndFill() {
  const newCells = new Set();
  for (let c = 0; c < COLS; c++) {
    // Compact downward (carry specials with their fruit)
    let empty = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][c] !== null) {
        board[empty][c]   = board[r][c];
        special[empty][c] = special[r][c];
        if (empty !== r) { board[r][c] = null; special[r][c] = null; }
        empty--;
      }
    }
    // Fill top
    for (let r = 0; r <= empty; r++) {
      board[r][c]   = safeRandom(r, c);
      special[r][c] = null;
      newCells.add(r * COLS + c);
    }
  }
  return newCells;
}

// ── Rendering ──────────────────────────────────────────────────────────────

function cell(r, c) { return boardEl.children[r * COLS + c]; }

function render(newCells = new Set()) {
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const div = document.createElement('div');
      div.className = 'cell';
      div.dataset.r = r;
      div.dataset.c = c;
      const g = board[r][c];
      if (g !== null) {
        const gem = document.createElement('div');
        gem.className = 'gem gem-' + g;
        gem.textContent = GEM_EMOJI[g];
        if (special[r] && special[r][c]) gem.classList.add('glowing');
        if (newCells.has(r * COLS + c)) div.classList.add('drop-in');
        div.appendChild(gem);
      } else {
        div.classList.add('empty');
      }
      div.addEventListener('pointerdown', onPointerDown);
      boardEl.appendChild(div);
    }
  }
  updateUI();
}

function updateUI() {
  movesUsedEl.textContent = moves;
  renderFruitTargets();
}

function renderFruitTargets() {
  for (let g = 0; g < GEM_TYPES; g++) {
    const el = document.getElementById('fruit-slot-' + g);
    if (!el) continue;
    const tgt       = fruitTargets[g] || 0;
    const collected = Math.min(fruitCollected[g] || 0, tgt);
    const done      = collected >= tgt;
    el.className = 'stat-fruit' + (done ? ' done' : '');
    el.innerHTML = '<span class="sf-emoji">' + GEM_EMOJI[g] + '</span>' +
                   '<span class="sf-count">' + collected + '/' + tgt + '</span>' +
                   '<span class="sf-check">✓</span>';
  }
}

// ── Combo display ──────────────────────────────────────────────────────────

// ── Cascade ────────────────────────────────────────────────────────────────

// Collect all cells to clear, respecting special effects (chain reaction)
function collectClear(initialCells) {
  const toNull = new Set();
  const queue = [...initialCells];
  while (queue.length) {
    const [r, c] = queue.shift();
    const key = r * COLS + c;
    if (toNull.has(key)) continue;
    toNull.add(key);
    const sp = special[r] && special[r][c];
    if (sp === 'glowing') {
      // Clear all fruit of the same type on the board
      const gemType = board[r][c];
      for (let rr = 0; rr < ROWS; rr++)
        for (let cc = 0; cc < COLS; cc++)
          if (board[rr][cc] === gemType)
            queue.push([rr, cc]);
    }
  }
  return [...toNull].map(idx => [Math.floor(idx/COLS), idx%COLS]);
}

async function cascade(combo) {
  const { groups, allCells } = getMatchGroups();
  if (!allCells.length) return;

  // Determine which cells to clear (including special chain reactions)
  const clearCells = collectClear(allCells);
  const clearSet = new Set(clearCells.map(([r,c]) => r*COLS+c));

  // Determine where to place special fruit (before clearing)
  const newSpecials = []; // [{r,c,kind,gemType}]
  const usedGroups = new Set();

  // Check for L/T shapes: two groups of the same fruit type that share a cell
  for (let i = 0; i < groups.length; i++) {
    for (let j = i + 1; j < groups.length; j++) {
      const a = groups[i], b = groups[j];
      if (a.gemType !== b.gemType) continue;
      if (a.dir === b.dir) continue; // must be perpendicular
      const hasSpecial = [...a.cells, ...b.cells].some(([r,c]) => special[r][c]);
      if (hasSpecial) continue;
      // Find shared cell (the corner of the L)
      const bSet = new Set(b.cells.map(([r,c]) => r*COLS+c));
      const shared = a.cells.find(([r,c]) => bSet.has(r*COLS+c));
      if (shared) {
        const totalCells = new Set([...a.cells, ...b.cells].map(([r,c]) => r*COLS+c));
        if (totalCells.size >= 5) {
          newSpecials.push({ r: shared[0], c: shared[1], kind: 'glowing', gemType: a.gemType });
          usedGroups.add(i);
          usedGroups.add(j);
        }
      }
    }
  }

  // Remaining groups: straight match of 4+
  for (let i = 0; i < groups.length; i++) {
    if (usedGroups.has(i)) continue;
    const { len, pivot, gemType, cells } = groups[i];
    const hasSpecialInGroup = cells.some(([r,c]) => special[r][c]);
    if (!hasSpecialInGroup && len >= 4) {
      newSpecials.push({ r: pivot[0], c: pivot[1], kind: 'glowing', gemType });
    }
  }

  // Hide matched gems and capture their types for flying clones
  // Build sets: cells that merge into a pivot vs cells that fly to monkey
  // Each newSpecial has a pivot and the group cells that feed into it
  const mergePivotMap = new Map(); // key="r,c" -> pivot {r,c}
  const pivotSet = new Set();
  for (const ns of newSpecials) {
    pivotSet.add(ns.r * COLS + ns.c);
    // Find the group(s) that created this special and mark all their cells
    for (const grp of groups) {
      if (grp.cells.some(([gr,gc]) => gr === ns.r && gc === ns.c) ||
          (grp.gemType === ns.gemType && grp.cells.some(([gr,gc]) => Math.abs(gr-ns.r)+Math.abs(gc-ns.c) <= 2))) {
        for (const [gr,gc] of grp.cells) {
          mergePivotMap.set(gr * COLS + gc, ns);
        }
      }
    }
  }

  // Cells not merging into a special fly to the monkey
  const flyCells = clearCells.filter(([r,c]) => !mergePivotMap.has(r*COLS+c) && !pivotSet.has(r*COLS+c));
  const capturedTypes = flyCells.map(([r,c]) => board[r][c] ?? 0);

  // Hide all matched cells
  clearCells.forEach(([r, c]) => {
    const el = cell(r, c);
    if (!el) return;
    el.classList.add(special[r][c] ? 'matching-special' : 'matching');
  });

  // Merge animations: group cells fly into their pivot
  for (const ns of newSpecials) {
    const mergeCells = [...mergePivotMap.entries()]
      .filter(([,pivot]) => pivot.r === ns.r && pivot.c === ns.c)
      .map(([key]) => [Math.floor(key/COLS), key%COLS]);
    mergeFruitToPivot(mergeCells, ns.r, ns.c);
  }

  // Non-merge cells fly to monkey
  const flyDuration = flyCells.length > 0 ? flyFruitToMonkey(flyCells, capturedTypes) : 0;
  const mergeDuration = newSpecials.length > 0 ? 380 : 0;
  const waitDuration = Math.max(flyDuration, mergeDuration);

  // Count cleared fruit — exclude cells that merge into a special (pivot and merge cells)
  const mergeSet = new Set([...mergePivotMap.keys(), ...pivotSet]);
  clearCells.forEach(([r,c]) => {
    if (mergeSet.has(r*COLS+c)) return;
    const g = board[r][c];
    if (g != null && g >= 0 && g < GEM_TYPES) fruitCollected[g] = (fruitCollected[g]||0) + 1;
  });

  // Score
  let basePts = 0;
  clearCells.forEach(([r,c]) => { basePts += special[r][c] ? 60 : 20; });
  const multiplier = combo;
  const pts = basePts * multiplier;
  updateUI();

  // Wait for animations, then monkey chomps (only if fruit went to monkey)
  await delay(Math.max(waitDuration - 80, 300));
  if (flyCells.length > 0) {
    monkeyEat(flyCells, combo, capturedTypes);
    await delay(180);
  } else {
    await delay(100);
  }

  // Clear from data
  clearCells.forEach(([r, c]) => { board[r][c] = null; special[r][c] = null; });

  // Place new specials
  for (const { r, c, kind, gemType } of newSpecials) {
    if (board[r][c] === null) {
      board[r][c]   = gemType;
      special[r][c] = kind;
    }
  }

  render();
  await delay(80);

  const fresh = dropAndFill();
  render(fresh);
  await delay(380);

  await cascade(combo + 1);
}

const MONKEY_PHRASES = [
  'Yum!', 'Mmm!', 'Oo oo!', 'Delish!', 'More!',
  'Tasty!', 'Ooh ah!', 'Nom!', 'Yes!', 'Combo!'
];
let monkeyTimer = null;

function monkeyEat(matches, combo, capturedTypes) {
  const monkeyEl  = document.getElementById('monkey');
  const fruitEl   = document.getElementById('monkey-fruit');
  const speechEl  = document.getElementById('monkey-speech');

  // Fruit display is handled by flying clones; just show the last one briefly
  const [r, c] = matches[Math.floor(Math.random() * matches.length)];
  const g = capturedTypes ? capturedTypes[0] : (board[r] && board[r][c] != null ? board[r][c] : null);
  fruitEl.textContent = g !== null ? GEM_EMOJI[g] : GEM_EMOJI[Math.floor(Math.random() * GEM_TYPES)];

  // Pick phrase — extra excitement for combos
  const phrase = combo >= 3 ? '🔥 Combo!' :
                 combo === 2 ? 'Again!' :
                 MONKEY_PHRASES[Math.floor(Math.random() * MONKEY_PHRASES.length)];
  speechEl.textContent = phrase;

  // Restart animations cleanly
  monkeyEl.classList.remove('idle', 'chomp');
  fruitEl.classList.remove('show');
  speechEl.classList.remove('show');
  void monkeyEl.offsetWidth; // force reflow

  monkeyEl.classList.add('chomp');
  fruitEl.classList.add('show');
  speechEl.classList.add('show');

  if (monkeyTimer) clearTimeout(monkeyTimer);
  monkeyTimer = setTimeout(() => {
    monkeyEl.classList.remove('chomp');
    monkeyEl.classList.add('idle');
    fruitEl.classList.remove('show');
    speechEl.classList.remove('show');
  }, 1000);
}

function mergeFruitToPivot(mergeCells, pivotR, pivotC) {
  // Fly all cells in mergeCells straight into the pivot cell, then flash it
  const pivotEl = cell(pivotR, pivotC);
  if (!pivotEl) return;
  const pRect = pivotEl.getBoundingClientRect();
  const destX = pRect.left + pRect.width  / 2;
  const destY = pRect.top  + pRect.height / 2;

  mergeCells.forEach(([r, c], idx) => {
    if (r === pivotR && c === pivotC) return; // skip pivot itself
    const el = cell(r, c);
    if (!el) return;
    const cRect = el.getBoundingClientRect();
    const startX = cRect.left + cRect.width  / 2;
    const startY = cRect.top  + cRect.height / 2;

    const fly = document.createElement('div');
    fly.className = 'fly-fruit';
    fly.textContent = GEM_EMOJI[board[r][c] ?? 0];
    fly.style.left = startX + 'px';
    fly.style.top  = startY + 'px';
    fly.style.transform = 'translate(-50%, -50%) scale(1)';
    fly.style.opacity = '1';
    document.body.appendChild(fly);

    const dx = destX - startX;
    const dy = destY - startY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const mergeDur = Math.round(dist / 0.9);
    setTimeout(() => {
      fly.animate([
        { transform: 'translate(-50%, -50%) scale(1)',   opacity: 1 },
        { transform: `translate(calc(${dx}px - 50%), calc(${dy}px - 50%)) scale(0.2)`, opacity: 0 }
      ], { duration: mergeDur, easing: 'ease-in', fill: 'forwards' }).onfinish = () => fly.remove();
    }, idx * 40);
  });
}

function flyFruitToMonkey(clearCells, capturedTypes) {
  // Get monkey's screen position (the fruit slot in front of it)
  const fruitEl  = document.getElementById('monkey-fruit');
  const monkeyEl = document.getElementById('monkey');
  const mRect = fruitEl.getBoundingClientRect();
  const destX = mRect.left + mRect.width / 2;
  const destY = mRect.top  + mRect.height / 2;

  const SPEED   = 0.9; // px per ms — constant travel speed
  const STAGGER = 60;  // ms between each fruit launch
  const maxFly  = Math.min(clearCells.length, 12);
  let latestArrival = 0;

  clearCells.slice(0, maxFly).forEach(([r, c], idx) => {
    const el = cell(r, c);
    if (!el) return;
    const cRect  = el.getBoundingClientRect();
    const startX = cRect.left + cRect.width  / 2;
    const startY = cRect.top  + cRect.height / 2;
    const dx     = destX - startX;
    const dy     = destY - startY;
    const dist   = Math.sqrt(dx*dx + dy*dy);
    const duration = Math.round(dist / SPEED);
    const delay_ms = idx * STAGGER;
    if (delay_ms + duration > latestArrival) latestArrival = delay_ms + duration;

    const fly = document.createElement('div');
    fly.className   = 'fly-fruit';
    fly.textContent = GEM_EMOJI[capturedTypes[idx] ?? capturedTypes[0]];
    fly.style.left  = startX + 'px';
    fly.style.top   = startY + 'px';
    fly.style.transform = 'translate(-50%, -50%) scale(1)';
    fly.style.opacity   = '1';
    document.body.appendChild(fly);

    setTimeout(() => {
      fly.animate([
        { transform: 'translate(-50%, -50%) scale(1)',   opacity: 1 },
        { transform: `translate(calc(${dx}px - 50%), calc(${dy}px - 50%)) scale(0.5)`, opacity: 0 }
      ], { duration, easing: 'ease-in', fill: 'forwards' }).onfinish = () => fly.remove();
    }, delay_ms);
  });

  return latestArrival + 80; // small buffer after last fruit lands
}

function showScorePop([r, c], pts, multiplier = 1) {
  const el = cell(r, c);
  if (!el) return;
  const bRect = boardEl.getBoundingClientRect();
  const cRect = el.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = '+' + pts + (multiplier >= 2 ? ' ×' + multiplier : '');
  pop.style.left = (cRect.left - bRect.left + cRect.width / 2) + 'px';
  pop.style.top  = (cRect.top  - bRect.top) + 'px';
  boardEl.style.position = 'relative';
  boardEl.appendChild(pop);
  pop.addEventListener('animationend', () => pop.remove());
}

// ── Input ──────────────────────────────────────────────────────────────────

function onPointerDown(e) {
  if (busy) return;
  e.preventDefault();
  const r = +e.currentTarget.dataset.r;
  const c = +e.currentTarget.dataset.c;
  touchStart = { r, c, x: e.clientX, y: e.clientY };
  e.currentTarget.setPointerCapture(e.pointerId);
  e.currentTarget.addEventListener('pointerup',   onPointerUp,   { once: true });
  e.currentTarget.addEventListener('pointermove', onPointerMove);
}

function onPointerMove(e) {
  if (!touchStart) return;
  const dx = e.clientX - touchStart.x;
  const dy = e.clientY - touchStart.y;
  if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
    e.currentTarget.removeEventListener('pointermove', onPointerMove);
    const { r, c } = touchStart;
    touchStart = null;
    if (Math.abs(dx) > Math.abs(dy)) trySwap(r, c, r, c + (dx > 0 ? 1 : -1));
    else                              trySwap(r, c, r + (dy > 0 ? 1 : -1), c);
  }
}

function onPointerUp(e) {
  e.currentTarget.removeEventListener('pointermove', onPointerMove);
  if (!touchStart) return;
  const { r, c } = touchStart;
  touchStart = null;
  handleTap(r, c);
}

function handleTap(r, c) {
  if (board[r][c] === null) return;
  if (!selected) {
    selected = { r, c };
    cell(r, c).classList.add('selected');
    return;
  }
  const { r: sr, c: sc } = selected;
  cell(sr, sc).classList.remove('selected');
  selected = null;
  if (sr === r && sc === c) return;
  if (Math.abs(r - sr) + Math.abs(c - sc) === 1) trySwap(sr, sc, r, c);
}

async function trySwap(r1, c1, r2, c2) {
  if (r2 < 0 || r2 >= ROWS || c2 < 0 || c2 >= COLS) return;
  if (busy) return;
  busy = true;

  const dir1 = r1 === r2 ? (c2 > c1 ? 'right' : 'left') : (r2 > r1 ? 'down' : 'up');
  const dir2 = r1 === r2 ? (c2 > c1 ? 'left' : 'right') : (r2 > r1 ? 'up'   : 'down');

  // Test swap in data
  swapCells(r1, c1, r2, c2);
  const valid = getMatches().length > 0;

  if (!valid) {
    // Undo and bounce
    swapCells(r1, c1, r2, c2);
    cell(r1, c1).classList.add('bounce-' + dir1);
    cell(r2, c2).classList.add('bounce-' + dir2);
    await delay(320);
    cell(r1, c1).classList.remove('bounce-' + dir1);
    cell(r2, c2).classList.remove('bounce-' + dir2);
    busy = false;
    return;
  }

  // Animate slide then render swapped board, then cascade
  cell(r1, c1).classList.add('swap-' + dir1);
  cell(r2, c2).classList.add('swap-' + dir2);
  await delay(190);

  moves--;
  movesUsed++;
  render();           // board now shows swapped state
  await cascade(1);   // finds & clears matches, drops, fills, repeats

  if (!hasValidMove()) { shuffleBoard(); render(); }

  saveGame();

  if (allTargetsMet())  showLevelComplete();
  else if (moves <= 0)  showGameOver();

  busy = false;
}

// ── Hint ───────────────────────────────────────────────────────────────────

function showHint() {
  if (hints <= 0 || busy) return;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const pairs = [[r, c, r, c+1], [r, c, r+1, c]];
      for (const [r1, c1, r2, c2] of pairs) {
        if (r2 >= ROWS || c2 >= COLS) continue;
        swapCells(r1, c1, r2, c2);
        const ok = getMatches().length > 0;
        swapCells(r1, c1, r2, c2);
        if (ok) {
          hints--;
          [cell(r1,c1), cell(r2,c2)].forEach(el => {
            el.classList.add('hint');
            setTimeout(() => el.classList.remove('hint'), 2500);
          });
          return;
        }
      }
    }
  }
}

// ── Overlays ───────────────────────────────────────────────────────────────

function checkBestLevel() {
  if (level > bestLevel) { bestLevel = level; saveBestLevel(); return true; }
  return false;
}

function showLevelComplete() {
  const isNew = checkBestLevel();
  document.getElementById('ol-title').textContent = 'Level Complete!';
  document.getElementById('ol-moves').textContent = movesUsed + ' move' + (movesUsed === 1 ? '' : 's') + ' used';
  document.getElementById('ol-hiscore-wrap').style.display = isNew ? 'block' : 'none';
  document.getElementById('ol-btn').textContent   = 'Next Level ›';
  document.getElementById('ol-btn').onclick       = nextLevel;
  overlay.classList.add('show');
  updateUI();
}

function showGameOver() {
  document.getElementById('ol-title').textContent = 'No More Moves';
  document.getElementById('ol-moves').textContent = movesUsed + ' move' + (movesUsed === 1 ? '' : 's') + ' used';
  document.getElementById('ol-hiscore-wrap').style.display = 'none';
  document.getElementById('ol-btn').textContent   = 'Try Again';
  document.getElementById('ol-btn').onclick       = newGame;
  overlay.classList.add('show');
  updateUI();
}

function nextLevel() {
  overlay.classList.remove('show');
  level++;
  moves  = 30 + Math.min(level * 2, 20);
  movesUsed = 0;
  hints  = 3;
  initTargets();
  // Keep the existing board — only shuffle if no valid moves remain
  if (!hasValidMove()) { shuffleBoard(); }
  render();
  saveGame();
}

function newGame() {
  overlay.classList.remove('show');
  level = 1; moves = 30; movesUsed = 0; hints = 3; selected = null;
  initTargets();
  clearSave();
  newBoard();
  render();
}

// ── Persistence ────────────────────────────────────────────────────────────

function saveGame() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify({ board, special, level, moves, movesUsed, hints, fruitTargets, fruitCollected })); } catch(e) {}
}

function loadGame() {
  try {
    const s = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null');
    if (!s || !Array.isArray(s.board) || s.board.length !== ROWS) return false;
    board = s.board; level = s.level ?? 1;
    moves = s.moves ?? 30; movesUsed = s.movesUsed ?? 0; hints = s.hints ?? 3;
    special = s.special ?? board.map(row => row.map(() => null));
    fruitTargets   = s.fruitTargets   ?? levelFruitTargets(level);
    fruitCollected = s.fruitCollected ?? Array(GEM_TYPES).fill(0);
    return true;
  } catch(e) { return false; }
}

function clearSave()    { try { localStorage.removeItem(SAVE_KEY); } catch(e) {} }
function saveBestLevel() { try { localStorage.setItem(BEST_KEY, bestLevel); } catch(e) {} }
function loadBestLevel() { try { bestLevel = parseInt(localStorage.getItem(BEST_KEY) || '1', 10) || 1; } catch(e) {} }

// ── Boot ───────────────────────────────────────────────────────────────────



loadBestLevel();
if (loadGame()) render();
else { initTargets(); newBoard(); render(); }
document.getElementById('monkey').classList.add('idle');

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}
</script>
